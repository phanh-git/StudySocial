# Server
server.port=8080
spring.application.name=studysocial

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/studysocial}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:StudySocialSecretKey2024VeryLongSecretKeyForHS256AlgorithmAtLeast32Chars}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging
logging.level.com.example.demo=INFO
